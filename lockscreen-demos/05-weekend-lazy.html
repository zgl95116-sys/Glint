<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="color-scheme" content="light">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@200;300;400;600&family=Caveat:wght@400;500&display=swap');

  *{margin:0;padding:0;box-sizing:border-box}
  body{
    width:390px;height:844px;overflow:hidden;
    font-family:'Noto Serif SC',serif;
    background:#faf8f2;
    position:relative;
  }

  /* === WARM MORNING WASH — watercolor feel === */
  .wash-1{
    position:absolute;
    top:-10%;left:-20%;
    width:80vw;height:60vh;
    border-radius:50%;
    background:radial-gradient(circle,rgba(255,200,140,0.25),rgba(255,180,120,0.1) 40%,transparent 70%);
    filter:blur(60px);
    animation:wash-float-1 15s ease-in-out infinite;
  }
  @keyframes wash-float-1{
    0%,100%{transform:translate(0,0) scale(1)}
    50%{transform:translate(20px,30px) scale(1.05)}
  }

  .wash-2{
    position:absolute;
    bottom:10%;right:-15%;
    width:70vw;height:50vh;
    border-radius:50%;
    background:radial-gradient(circle,rgba(180,210,240,0.2),rgba(160,200,230,0.08) 40%,transparent 70%);
    filter:blur(50px);
    animation:wash-float-2 18s ease-in-out infinite;
  }
  @keyframes wash-float-2{
    0%,100%{transform:translate(0,0) scale(1)}
    50%{transform:translate(-15px,-20px) scale(1.08)}
  }

  .wash-3{
    position:absolute;
    top:40%;left:30%;
    width:50vw;height:40vh;
    border-radius:50%;
    background:radial-gradient(circle,rgba(220,190,230,0.12),transparent 50%);
    filter:blur(50px);
    animation:wash-float-1 20s ease-in-out infinite 3s;
  }

  /* === FLOATING PETALS — spring feeling === */
  .petal{
    position:absolute;
    width:12px;height:8px;
    border-radius:50% 0 50% 0;
    opacity:0;
    animation:petal-fall linear infinite;
  }
  @keyframes petal-fall{
    0%{transform:translate(0,0) rotate(0deg);opacity:0}
    10%{opacity:0.7}
    90%{opacity:0.5}
    100%{transform:translate(-60px,120vh) rotate(360deg);opacity:0}
  }

  /* === HAND-DRAWN UNDERLINE === */
  .hand-line{
    display:block;height:3px;
    background:linear-gradient(90deg,transparent,rgba(200,160,100,0.3),rgba(200,160,100,0.4),rgba(200,160,100,0.3),transparent);
    border-radius:2px;
    margin-top:6px;
    transform:rotate(-0.5deg);
  }

  .grain{
    position:absolute;inset:0;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events:none;opacity:0.5;
    mix-blend-mode:multiply;
  }

  .content{
    position:absolute;inset:0;
    display:flex;flex-direction:column;
    padding:52px 30px 44px;
    z-index:10;
  }

  @keyframes gentle-up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  @keyframes lazy-sway{
    0%,100%{transform:rotate(-1deg)}
    50%{transform:rotate(1deg)}
  }
</style>
</head>
<body>
  <!-- Watercolor washes -->
  <div class="wash-1"></div>
  <div class="wash-2"></div>
  <div class="wash-3"></div>

  <!-- Petals -->
  <div class="petal" style="left:15%;top:-5%;background:rgba(255,180,190,0.6);animation-duration:12s;animation-delay:1s"></div>
  <div class="petal" style="left:45%;top:-8%;background:rgba(255,190,170,0.5);animation-duration:15s;animation-delay:3s;width:10px;height:6px"></div>
  <div class="petal" style="left:70%;top:-3%;background:rgba(255,170,180,0.5);animation-duration:18s;animation-delay:5s"></div>
  <div class="petal" style="left:30%;top:-10%;background:rgba(240,180,200,0.4);animation-duration:14s;animation-delay:7s;width:8px;height:5px"></div>
  <div class="petal" style="left:85%;top:-6%;background:rgba(255,185,175,0.5);animation-duration:16s;animation-delay:2s;width:14px;height:9px"></div>

  <div class="grain"></div>

  <div class="content">
    <!-- Day label — casual, handwritten feel -->
    <div style="animation:gentle-up 1s ease 0.3s both">
      <div style="font-family:'Caveat',cursive;font-size:20px;color:rgba(160,130,90,0.6);letter-spacing:2px;transform:rotate(-2deg)">Saturday Morning</div>
    </div>

    <!-- HERO: A giant lazy time display -->
    <div style="margin-top:20px;animation:gentle-up 1.2s ease 0.6s both">
      <div style="font-size:140px;font-weight:200;color:rgba(60,50,40,0.88);line-height:0.85;letter-spacing:-6px">
        10<span style="font-size:50px;font-weight:300;color:rgba(160,130,90,0.6);vertical-align:middle;letter-spacing:0;margin:0 4px">:</span>47
      </div>
      <div class="hand-line" style="width:80px;margin-left:4px"></div>
    </div>

    <!-- Weather — big, gentle -->
    <div style="margin-top:20px;animation:gentle-up 1s ease 1s both">
      <div style="display:flex;align-items:baseline;gap:12px">
        <span style="font-size:48px;font-weight:200;color:rgba(60,50,40,0.75)">22°</span>
        <span style="font-size:18px;color:rgba(120,100,70,0.55);font-weight:300">多云 · 微风 · 适合发呆</span>
      </div>
    </div>

    <!-- AI VOICE — warm, unhurried, no pressure -->
    <div style="margin-top:auto;animation:gentle-up 1s ease 1.5s both">
      <div style="font-size:28px;font-weight:300;color:rgba(50,40,30,0.85);line-height:1.8;letter-spacing:1px">
        周末嘛，<br>
        醒了就是醒了，<br>
        起不起再说。
      </div>
    </div>

    <!-- Gentle suggestions — no urgency, just warmth -->
    <div style="margin-top:28px;animation:gentle-up 1s ease 2s both">
      <div style="background:rgba(255,255,255,0.5);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:20px;padding:22px 24px;border:1px solid rgba(200,180,140,0.15)">
        <div style="font-size:13px;color:rgba(140,115,75,0.5);letter-spacing:3px;margin-bottom:14px">今天没有必须做的事</div>
        <div style="font-size:17px;color:rgba(50,40,30,0.8);line-height:1.9">
          <div style="display:flex;align-items:center;gap:10px">
            <span style="font-size:24px;animation:lazy-sway 3s ease-in-out infinite">☕</span>
            <span>先来杯咖啡？楼下 Manner 九折</span>
          </div>
          <div style="display:flex;align-items:center;gap:10px;margin-top:4px">
            <span style="font-size:24px;animation:lazy-sway 3s ease-in-out infinite 0.5s">📚</span>
            <span>《百年孤独》还剩 80 页</span>
          </div>
          <div style="display:flex;align-items:center;gap:10px;margin-top:4px">
            <span style="font-size:24px;animation:lazy-sway 3s ease-in-out infinite 1s">🌿</span>
            <span>阳台的薄荷该浇水了</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div style="text-align:center;margin-top:20px;animation:gentle-up 0.8s ease 2.5s both">
      <div style="font-family:'Caveat',cursive;font-size:14px;color:rgba(160,130,90,0.25);letter-spacing:4px">GLINT · WEEKEND</div>
    </div>
  </div>
</body>
</html>
