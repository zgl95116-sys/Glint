<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"><meta name="color-scheme" content="dark">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-user-select:none;user-select:none}
body{overflow:hidden;background:#050510;font-family:system-ui,sans-serif;touch-action:none}
canvas{position:absolute;inset:0}
.ui{position:absolute;inset:0;display:flex;flex-direction:column;padding:10% 7% 6%;pointer-events:none;z-index:10}
</style></head><body>
<canvas id="c"></canvas>
<div class="ui">
<div style="flex:1"></div>
<div id="wish" style="font-size:22px;color:rgba(255,255,255,0.8);text-align:center;line-height:1.6;text-shadow:0 0 20px rgba(100,150,255,0.2);opacity:0;transition:opacity 1s ease">划过天空的每一颗星，<br>都替你记住了一个愿望。</div>
<div style="text-align:center;margin-top:16px;font-size:13px;color:rgba(255,255,255,0.2);letter-spacing:3px" id="hint">↑ SWIPE UP TO LAUNCH A STAR ↑</div>
<div style="text-align:center;margin-top:8px;font-size:11px;color:rgba(150,180,255,0.1);letter-spacing:6px">GLINT · WISH</div>
</div>
<script>
const C=document.getElementById('c'),X=C.getContext('2d');
function resize(){C.width=window.innerWidth;C.height=window.innerHeight}
resize();window.addEventListener('resize',resize);

const wishEl=document.getElementById('wish'),hintEl=document.getElementById('hint');
let stars=[],shooters=[],trails=[],sparkles=[],wishCount=0;
const w=()=>C.width,h=()=>C.height;

// Background stars
for(let i=0;i<120;i++)stars.push({x:Math.random(),y:Math.random(),sz:0.5+Math.random()*2,sp:0.3+Math.random()*2,ph:Math.random()*Math.PI*2});

// Nebula colors
const nebulas=[
  {x:0.3,y:0.2,r:0.25,h:240,s:40,l:15},
  {x:0.7,y:0.6,r:0.3,h:280,s:30,l:12},
  {x:0.5,y:0.8,r:0.2,h:200,s:35,l:10}
];

// Swipe detection
let swipeStart=null;
C.addEventListener('pointerdown',e=>{swipeStart={x:e.clientX,y:e.clientY,t:Date.now()}});
C.addEventListener('pointerup',e=>{
  if(!swipeStart)return;
  const dx=e.clientX-swipeStart.x,dy=e.clientY-swipeStart.y;
  const dist=Math.sqrt(dx*dx+dy*dy);
  const dt=Date.now()-swipeStart.t;
  if(dist>30&&dt<500){
    // Launch shooting star from swipe origin, in swipe direction
    const angle=Math.atan2(dy,dx);
    const speed=3+dist/50;
    const sx=swipeStart.x,sy=swipeStart.y;
    const hue=Math.random()*60+180; // blue-purple-teal
    shooters.push({
      x:sx,y:sy,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,
      life:1,hue,sz:3+Math.random()*2,trail:[]
    });
    wishCount++;
    if(wishCount===1){wishEl.style.opacity='1';hintEl.style.opacity='0'}
    if(wishCount===5)wishEl.innerHTML='五颗流星。<br>今晚的天空，被你点亮了。';
    if(wishCount===15)wishEl.innerHTML='你已经许了 '+wishCount+' 个愿望。<br>宇宙都记住了。';
    if(wishCount>15&&wishCount%5===0)wishEl.innerHTML='第 '+wishCount+' 颗。<br>继续，夜还长。';
  }
  swipeStart=null;
});

let t=0,lt=0;
function loop(ts){
  if(!lt)lt=ts;t=ts;const dt=ts-lt;lt=ts;
  const W=w(),H=h();
  X.clearRect(0,0,W,H);

  // Deep space bg
  const bg=X.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*0.7);
  bg.addColorStop(0,'#0a0a1a');bg.addColorStop(1,'#030308');
  X.fillStyle=bg;X.fillRect(0,0,W,H);

  // Nebula clouds
  nebulas.forEach(n=>{
    const g=X.createRadialGradient(n.x*W,n.y*H,0,n.x*W,n.y*H,n.r*Math.max(W,H));
    g.addColorStop(0,`hsla(${n.h},${n.s}%,${n.l}%,0.15)`);
    g.addColorStop(1,'transparent');
    X.fillStyle=g;X.fillRect(0,0,W,H);
  });

  // Stars
  stars.forEach(s=>{
    const tw=0.3+Math.sin(t*0.001*s.sp+s.ph)*0.7;
    X.fillStyle=`rgba(200,210,255,${tw*0.5})`;
    X.beginPath();X.arc(s.x*W,s.y*H,s.sz,0,Math.PI*2);X.fill();
  });

  // Shooting stars
  shooters=shooters.filter(s=>{
    s.x+=s.vx;s.y+=s.vy;
    s.vx*=0.995;s.vy*=0.995;
    s.life-=0.008;

    // Trail
    s.trail.push({x:s.x,y:s.y,life:1});
    if(s.trail.length>40)s.trail.shift();

    // Draw trail
    for(let i=0;i<s.trail.length;i++){
      const tp=s.trail[i];
      tp.life-=0.03;
      const alpha=Math.max(0,tp.life)*s.life;
      const w=s.sz*(i/s.trail.length);
      X.fillStyle=`hsla(${s.hue},70%,80%,${alpha*0.6})`;
      X.beginPath();X.arc(tp.x,tp.y,w,0,Math.PI*2);X.fill();
    }

    // Head glow
    const glow=X.createRadialGradient(s.x,s.y,0,s.x,s.y,s.sz*6);
    glow.addColorStop(0,`hsla(${s.hue},80%,90%,${s.life*0.5})`);
    glow.addColorStop(1,'transparent');
    X.fillStyle=glow;X.fillRect(s.x-s.sz*6,s.y-s.sz*6,s.sz*12,s.sz*12);

    // Head
    X.fillStyle=`hsla(${s.hue},60%,95%,${s.life})`;
    X.beginPath();X.arc(s.x,s.y,s.sz,0,Math.PI*2);X.fill();

    // Sparkles
    if(Math.random()<0.3){
      sparkles.push({x:s.x+(Math.random()-0.5)*10,y:s.y+(Math.random()-0.5)*10,life:1,sz:1+Math.random()*2,hue:s.hue});
    }

    // Out of bounds or dead
    return s.life>0&&s.x>-50&&s.x<W+50&&s.y>-50&&s.y<H+50;
  });

  // Sparkles
  sparkles=sparkles.filter(s=>{
    s.life-=0.03;
    X.fillStyle=`hsla(${s.hue},70%,80%,${s.life*0.8})`;
    X.beginPath();
    // 4-pointed star shape
    const sz=s.sz*s.life;
    X.moveTo(s.x,s.y-sz*2);X.lineTo(s.x+sz*0.3,s.y-sz*0.3);
    X.lineTo(s.x+sz*2,s.y);X.lineTo(s.x+sz*0.3,s.y+sz*0.3);
    X.lineTo(s.x,s.y+sz*2);X.lineTo(s.x-sz*0.3,s.y+sz*0.3);
    X.lineTo(s.x-sz*2,s.y);X.lineTo(s.x-sz*0.3,s.y-sz*0.3);
    X.closePath();X.fill();
    return s.life>0;
  });

  // Wish counter
  if(wishCount>0){
    X.fillStyle='rgba(200,210,255,0.15)';
    X.font='12px monospace';X.textAlign='right';
    X.fillText('★ × '+wishCount,W-20,40);
  }

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script></body></html>
