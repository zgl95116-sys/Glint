<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="color-scheme" content="dark">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@100;300;400;700;900&family=Noto+Serif+SC:wght@200;400&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    width:390px;height:844px;overflow:hidden;
    font-family:'Noto Sans SC',system-ui,sans-serif;
    background:#faf7f0;
    position:relative;
  }

  /* === The core idea: your entire day as a single continuous stream === */

  .bg{
    position:absolute;inset:0;
    background:
      linear-gradient(180deg,#faf7f0 0%,#f5f0e5 40%,#f0ebe0 100%);
  }

  /* River of time — a flowing SVG curve */
  .river{
    position:absolute;
    left:60px;top:0;bottom:0;
    width:4px;
    overflow:visible;
  }

  .content{
    position:absolute;inset:0;
    display:flex;flex-direction:column;
    padding:52px 28px 40px;
    z-index:10;
  }

  @keyframes fade-in{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
  @keyframes number-grow{from{opacity:0;transform:scale(0.8)}to{opacity:1;transform:scale(1)}}
  @keyframes line-draw{from{stroke-dashoffset:600}to{stroke-dashoffset:0}}
  @keyframes dot-pop{from{r:0;opacity:0}to{r:5;opacity:1}}
</style>
</head>
<body>
  <div class="bg"></div>

  <!-- The flowing river of data -->
  <svg style="position:absolute;inset:0;width:100%;height:100%;z-index:2" viewBox="0 0 390 844">
    <!-- Main flowing line -->
    <path d="M 75,40 C 75,120 75,130 78,180 S 82,260 75,320 S 68,400 75,460 S 85,540 75,600 S 65,680 75,740 S 75,800 75,840"
          fill="none" stroke="rgba(180,150,100,0.2)" stroke-width="2"
          stroke-dasharray="600" style="animation:line-draw 3s ease forwards"/>

    <!-- Event dots along the river -->
    <circle cx="75" cy="120" fill="#e85d3a" style="animation:dot-pop 0.5s ease 0.8s both">
      <animate attributeName="r" from="0" to="5" dur="0.5s" begin="0.8s" fill="freeze"/>
    </circle>
    <circle cx="78" cy="260" fill="#4a90d9" style="animation:dot-pop 0.5s ease 1.2s both">
      <animate attributeName="r" from="0" to="5" dur="0.5s" begin="1.2s" fill="freeze"/>
    </circle>
    <circle cx="75" cy="400" fill="#2ecc71" style="animation:dot-pop 0.5s ease 1.6s both">
      <animate attributeName="r" from="0" to="4" dur="0.5s" begin="1.6s" fill="freeze"/>
    </circle>
    <circle cx="72" cy="540" fill="#f39c12" style="animation:dot-pop 0.5s ease 2.0s both">
      <animate attributeName="r" from="0" to="6" dur="0.5s" begin="2.0s" fill="freeze"/>
    </circle>
    <circle cx="75" cy="680" fill="#9b59b6" style="animation:dot-pop 0.5s ease 2.4s both">
      <animate attributeName="r" from="0" to="4" dur="0.5s" begin="2.4s" fill="freeze"/>
    </circle>

    <!-- Tiny pulse rings on the current event -->
    <circle cx="72" cy="540" r="6" fill="none" stroke="rgba(243,156,18,0.3)" stroke-width="1">
      <animate attributeName="r" values="6;20;6" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0;0.4" dur="3s" repeatCount="indefinite"/>
    </circle>
  </svg>

  <div class="content">
    <!-- HERO: One giant number that tells the whole story -->
    <div style="animation:number-grow 1s ease 0.5s both">
      <div style="font-size:160px;font-weight:900;color:rgba(40,35,25,0.88);line-height:0.8;letter-spacing:-8px">
        4<span style="font-size:60px;font-weight:300;color:rgba(180,150,100,0.6);vertical-align:super;letter-spacing:0">/6</span>
      </div>
      <div style="font-size:15px;color:rgba(120,100,70,0.5);letter-spacing:3px;margin-top:8px;margin-left:4px">
        今天的事做完四件了
      </div>
    </div>

    <!-- Events along the timeline -->
    <div style="margin-top:36px;padding-left:46px">
      <!-- Done items -->
      <div style="animation:fade-in 0.6s ease 1s both;margin-bottom:22px;opacity:0.5">
        <div style="font-size:13px;color:rgba(180,150,100,0.6);letter-spacing:1px">09:30</div>
        <div style="font-size:17px;color:rgba(40,35,25,0.5);text-decoration:line-through;text-decoration-color:rgba(180,150,100,0.3)">产品方案评审</div>
      </div>
      <div style="animation:fade-in 0.6s ease 1.3s both;margin-bottom:22px;opacity:0.5">
        <div style="font-size:13px;color:rgba(180,150,100,0.6);letter-spacing:1px">11:00</div>
        <div style="font-size:17px;color:rgba(40,35,25,0.5);text-decoration:line-through;text-decoration-color:rgba(180,150,100,0.3)">给运营回数据需求</div>
      </div>
      <div style="animation:fade-in 0.6s ease 1.6s both;margin-bottom:22px;opacity:0.5">
        <div style="font-size:13px;color:rgba(180,150,100,0.6);letter-spacing:1px">12:30</div>
        <div style="font-size:17px;color:rgba(40,35,25,0.5);text-decoration:line-through;text-decoration-color:rgba(180,150,100,0.3)">取快递 · 丰巢 #218</div>
      </div>

      <!-- Current — highlighted -->
      <div style="animation:fade-in 0.6s ease 2s both;margin-bottom:22px;padding:14px 16px;background:rgba(243,156,18,0.08);border-left:3px solid rgba(243,156,18,0.6);border-radius:0 12px 12px 0;margin-left:-16px;padding-left:32px">
        <div style="font-size:13px;color:rgba(243,156,18,0.7);letter-spacing:1px;font-weight:500">15:00 · 进行中</div>
        <div style="font-size:19px;color:rgba(40,35,25,0.88);font-weight:500">写周报</div>
        <div style="font-size:14px;color:rgba(120,100,70,0.5);margin-top:4px">已经在做了，别切出去</div>
      </div>

      <!-- Upcoming -->
      <div style="animation:fade-in 0.6s ease 2.3s both;margin-bottom:22px">
        <div style="font-size:13px;color:rgba(180,150,100,0.5);letter-spacing:1px">17:30</div>
        <div style="font-size:17px;color:rgba(40,35,25,0.65)">和设计对 UI 稿</div>
      </div>
      <div style="animation:fade-in 0.6s ease 2.6s both;margin-bottom:22px">
        <div style="font-size:13px;color:rgba(180,150,100,0.5);letter-spacing:1px">19:00</div>
        <div style="font-size:17px;color:rgba(40,35,25,0.65)">健身 · 推日</div>
      </div>
    </div>

    <div style="flex:1"></div>

    <!-- AI voice — woven into the data -->
    <div style="animation:fade-in 0.8s ease 3s both">
      <div style="font-family:'Noto Serif SC',serif;font-size:22px;font-weight:200;color:rgba(40,35,25,0.75);line-height:1.7;text-shadow:0 1px 4px rgba(255,255,255,0.5)">
        三分之二了。<br>按这个节奏，六点前能收工。
      </div>
    </div>

    <div style="text-align:right;margin-top:16px;animation:fade-in 0.6s ease 3.3s both">
      <span style="font-size:11px;color:rgba(180,150,100,0.2);letter-spacing:6px">GLINT · FLOW</span>
    </div>
  </div>
</body>
</html>
