<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark">
  <title>Glint · 万花筒 Kaleidoscope</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      background: #000;
    }

    .branding {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      letter-spacing: 2px;
      color: rgba(255, 255, 255, 0.3);
      pointer-events: none;
      font-weight: 300;
    }

    .hint {
      position: fixed;
      top: 20px;
      right: 20px;
      font-size: 10px;
      color: rgba(255, 255, 255, 0.2);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    canvas:hover ~ .hint {
      opacity: 1;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div class="branding">GLINT · 万花筒</div>
  <div class="hint">Tap to shift palette · Drag to influence</div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { alpha: false });

    // Resize canvas to fill viewport
    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    // ==================== STATE ====================
    let time = 0;
    let touchX = null;
    let touchY = null;
    let touchActive = false;
    let paletteIndex = 0;
    let speedMultiplier = 1;

    // Color palettes (jewel tones)
    const palettes = [
      // Deep purples, emeralds, sapphires
      ['#2d1b69', '#8b3a8b', '#d946ef', '#06b6d4', '#0ea5e9', '#10b981', '#f59e0b'],
      // Ruby, gold, sapphire
      ['#7c2d12', '#dc2626', '#f59e0b', '#06b6d4', '#3b82f6', '#8b5cf6', '#ec4899'],
      // Emerald, sapphire, amethyst
      ['#064e3b', '#10b981', '#06b6d4', '#0ea5e9', '#8b5cf6', '#d946ef', '#10b981'],
      // Ocean depths
      ['#0c4a6e', '#0369a1', '#06b6d4', '#10b981', '#6366f1', '#7c3aed', '#a78bfa'],
      // Twilight
      ['#3f0f3f', '#7c2d12', '#dc2626', '#f59e0b', '#d946ef', '#ec4899', '#0ea5e9'],
    ];

    const currentPalette = () => palettes[paletteIndex];

    // ==================== SHAPE ELEMENTS ====================
    class KaleidoscopeElement {
      constructor() {
        this.reset();
      }

      reset() {
        const angle = Math.random() * Math.PI * 2;
        const radius = 50 + Math.random() * 150;
        this.orbitRadius = radius;
        this.orbitAngle = angle;
        this.orbitSpeed = (0.3 + Math.random() * 0.5) * speedMultiplier;

        this.size = 20 + Math.random() * 50;
        this.sizePhase = Math.random() * Math.PI * 2;
        this.sizePulseSpeed = 0.01 + Math.random() * 0.02;

        this.colorIndex = Math.floor(Math.random() * currentPalette().length);
        this.colorShiftSpeed = 0.002 + Math.random() * 0.003;
        this.colorPhase = Math.random() * Math.PI * 2;

        this.lifespan = 300 + Math.random() * 200; // frames
        this.age = 0;

        this.shapeType = Math.floor(Math.random() * 4); // 0: circle, 1: spiral, 2: waves, 3: blob
        this.rotation = Math.random() * Math.PI * 2;
        this.rotationSpeed = (Math.random() - 0.5) * 0.05;
      }

      update() {
        this.age++;
        this.orbitAngle += this.orbitSpeed * 0.01;
        this.sizePhase += this.sizePulseSpeed;
        this.rotation += this.rotationSpeed;
        this.colorPhase += this.colorShiftSpeed;
      }

      getPosition() {
        let x = Math.cos(this.orbitAngle) * this.orbitRadius;
        let y = Math.sin(this.orbitAngle) * this.orbitRadius;

        // Touch influence
        if (touchActive && touchX !== null && touchY !== null) {
          const centerX = canvas.width / 2;
          const centerY = canvas.height / 2;
          const dx = touchX - centerX;
          const dy = touchY - centerY;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 300) {
            const influence = (1 - dist / 300) * 0.3;
            x += dx * influence * 0.1;
            y += dy * influence * 0.1;
          }
        }

        return { x, y };
      }

      getSize() {
        const pulse = Math.sin(this.sizePhase) * 0.3 + 0.7;
        return this.size * pulse;
      }

      getColor() {
        const palette = currentPalette();
        const shifted = (this.colorIndex + Math.floor(this.colorPhase / (Math.PI * 2))) % palette.length;
        return palette[shifted];
      }

      getOpacity() {
        const fadeIn = Math.min(this.age / 30, 1);
        const fadeOut = Math.max(1 - (this.age - (this.lifespan - 30)) / 30, 0);
        return fadeIn * fadeOut;
      }

      isDead() {
        return this.age >= this.lifespan;
      }

      draw(ctx, x, y) {
        const size = this.getSize();
        const opacity = this.getOpacity();
        const color = this.getColor();

        ctx.save();
        ctx.globalAlpha = opacity;
        ctx.fillStyle = color;
        ctx.strokeStyle = color;

        ctx.translate(x, y);
        ctx.rotate(this.rotation);

        switch (this.shapeType) {
          case 0: // Circle with gradient ring
            ctx.beginPath();
            ctx.arc(0, 0, size, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = color;
            ctx.globalAlpha = opacity * 0.5;
            ctx.lineWidth = 2;
            ctx.stroke();
            break;

          case 1: // Spiral
            ctx.strokeStyle = color;
            ctx.lineWidth = 2;
            ctx.globalAlpha = opacity * 0.7;
            ctx.beginPath();
            for (let i = 0; i < 3; i++) {
              const angle = (i / 3) * Math.PI * 2;
              const r = size * 0.3;
              ctx.moveTo(Math.cos(angle) * r, Math.sin(angle) * r);
              ctx.lineTo(Math.cos(angle + Math.PI * 0.3) * size, Math.sin(angle + Math.PI * 0.3) * size);
            }
            ctx.stroke();
            break;

          case 2: // Waves
            ctx.strokeStyle = color;
            ctx.lineWidth = 1.5;
            ctx.globalAlpha = opacity * 0.6;
            const waveCount = 4;
            for (let w = 0; w < waveCount; w++) {
              ctx.beginPath();
              const waveOffset = (w / waveCount) * Math.PI * 2;
              for (let a = 0; a < Math.PI * 2; a += 0.1) {
                const r = size * (0.3 + 0.3 * Math.sin(a * 2 + waveOffset));
                const px = Math.cos(a) * r;
                const py = Math.sin(a) * r;
                if (a === 0) ctx.moveTo(px, py);
                else ctx.lineTo(px, py);
              }
              ctx.closePath();
              ctx.stroke();
            }
            break;

          case 3: // Blob (organic shape)
            ctx.beginPath();
            const blobPoints = 8;
            for (let i = 0; i < blobPoints; i++) {
              const angle = (i / blobPoints) * Math.PI * 2;
              const blobVary = 0.7 + 0.3 * Math.sin(time * 0.02 + i);
              const r = size * blobVary;
              const px = Math.cos(angle) * r;
              const py = Math.sin(angle) * r;
              if (i === 0) ctx.moveTo(px, py);
              else ctx.lineTo(px, py);
            }
            ctx.closePath();
            ctx.fill();
            ctx.strokeStyle = color;
            ctx.globalAlpha = opacity * 0.4;
            ctx.lineWidth = 2;
            ctx.stroke();
            break;
        }

        ctx.restore();
      }
    }

    // Pool of elements
    const elements = [];
    for (let i = 0; i < 5; i++) {
      elements.push(new KaleidoscopeElement());
    }

    // ==================== DRAWING ====================
    function drawKaleidoscope() {
      // Clear canvas
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      const centerX = canvas.width / 2;
      const centerY = canvas.height / 2;
      const maxDim = Math.max(canvas.width, canvas.height);

      // Draw 8-fold symmetry
      const symmetry = 8;
      const anglePerWedge = (Math.PI * 2) / symmetry;

      // Update and draw elements
      for (let i = 0; i < elements.length; i++) {
        const elem = elements[i];
        elem.update();

        if (elem.isDead()) {
          elements[i] = new KaleidoscopeElement();
          elem = elements[i];
        }

        const { x, y } = elem.getPosition();

        // Draw each element in all symmetrical positions
        for (let wedge = 0; wedge < symmetry; wedge++) {
          ctx.save();
          ctx.translate(centerX, centerY);

          // Rotate to wedge position
          ctx.rotate(anglePerWedge * wedge);

          // Alternate mirroring for reflection effect
          if (wedge % 2 === 1) {
            ctx.scale(-1, 1);
          }

          elem.draw(ctx, x, y);

          ctx.restore();
        }
      }

      // Vignette effect
      const gradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, maxDim * 0.7);
      gradient.addColorStop(0, 'rgba(0, 0, 0, 0)');
      gradient.addColorStop(1, 'rgba(0, 0, 0, 0.4)');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    // ==================== INPUT HANDLING ====================
    document.addEventListener('touchstart', (e) => {
      const touch = e.touches[0];
      touchX = touch.clientX;
      touchY = touch.clientY;
      touchActive = true;

      // Tap to shift palette
      paletteIndex = (paletteIndex + 1) % palettes.length;
      speedMultiplier = 1.5;
      setTimeout(() => { speedMultiplier = 1; }, 300);
    });

    document.addEventListener('touchmove', (e) => {
      const touch = e.touches[0];
      touchX = touch.clientX;
      touchY = touch.clientY;
    });

    document.addEventListener('touchend', () => {
      touchActive = false;
      touchX = null;
      touchY = null;
    });

    document.addEventListener('click', (e) => {
      // Desktop support
      touchX = e.clientX;
      touchY = e.clientY;
      touchActive = true;

      paletteIndex = (paletteIndex + 1) % palettes.length;
      speedMultiplier = 1.5;
      setTimeout(() => { speedMultiplier = 1; }, 300);

      setTimeout(() => { touchActive = false; touchX = null; touchY = null; }, 100);
    });

    document.addEventListener('mousemove', (e) => {
      if (e.buttons === 1) { // Drag
        touchX = e.clientX;
        touchY = e.clientY;
        touchActive = true;
      }
    });

    document.addEventListener('mouseup', () => {
      touchActive = false;
      touchX = null;
      touchY = null;
    });

    // ==================== ANIMATION LOOP ====================
    function animate() {
      time++;
      drawKaleidoscope();
      requestAnimationFrame(animate);
    }

    animate();
  </script>
</body>
</html>
