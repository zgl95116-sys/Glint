<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glint · Storm Glass Lockscreen</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Microsoft YaHei', sans-serif;
      background: #0a0a0a;
    }

    canvas {
      display: block;
      max-width: 100vw;
      max-height: 100vh;
      cursor: pointer;
    }

    #brand {
      position: fixed;
      top: 20px;
      left: 20px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
      color: rgba(255, 255, 255, 0.6);
      text-transform: uppercase;
    }

    #hint {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      color: rgba(255, 255, 255, 0.4);
      font-weight: 500;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="brand">✦ GLINT</div>
  <div id="hint">轻触瓶身</div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { alpha: true });

    // ==================== Responsive Canvas ====================
    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    // ==================== Constants ====================
    const WEATHER_STATES = {
      CLEAR: 'clear',
      CLOUDY: 'cloudy',
      STORM: 'storm'
    };

    const WEATHER_INFO = {
      clear: {
        label: '晴',
        emoji: '☀️',
        temp: 24,
        bgGradient: ['#ffd89b', '#ff9d43'],
        liquidColor: 'rgba(100, 150, 200, 0.3)',
        liquidGlow: 'rgba(100, 180, 220, 0.2)'
      },
      cloudy: {
        label: '多云',
        emoji: '☁️',
        temp: 18,
        bgGradient: ['#7a8a9e', '#5a6b7f'],
        liquidColor: 'rgba(120, 140, 180, 0.4)',
        liquidGlow: 'rgba(120, 160, 200, 0.25)'
      },
      storm: {
        label: '暴雨',
        emoji: '⛈️',
        temp: 12,
        bgGradient: ['#1a2a4e', '#0f1929'],
        liquidColor: 'rgba(40, 80, 160, 0.5)',
        liquidGlow: 'rgba(80, 140, 200, 0.3)'
      }
    };

    // Bottle dimensions as percentage of screen height
    const BOTTLE_HEIGHT_RATIO = 0.4;
    const BOTTLE_WIDTH_RATIO = 0.15;

    // ==================== Helper Functions ====================
    function getBottleDimensions() {
      const bottleHeight = canvas.height * BOTTLE_HEIGHT_RATIO;
      const bottleWidth = canvas.height * BOTTLE_WIDTH_RATIO;
      const bottleX = canvas.width / 2;
      const bottleY = canvas.height / 2;
      return { bottleX, bottleY, bottleWidth, bottleHeight };
    }

    function lerp(a, b, t) {
      return a + (b - a) * Math.max(0, Math.min(1, t));
    }

    function parseRgba(color) {
      const match = color.match(/rgba?\((\d+),\s*(\d+),\s*(\d+)(?:,\s*([\d.]+))?\)/);
      if (!match) return { r: 0, g: 0, b: 0, a: 1 };
      return {
        r: parseInt(match[1]),
        g: parseInt(match[2]),
        b: parseInt(match[3]),
        a: parseFloat(match[4]) || 1
      };
    }

    function interpolateColor(color1, color2, t) {
      const c1 = parseRgba(color1);
      const c2 = parseRgba(color2);
      const r = Math.round(lerp(c1.r, c2.r, t));
      const g = Math.round(lerp(c1.g, c2.g, t));
      const b = Math.round(lerp(c1.b, c2.b, t));
      const a = lerp(c1.a, c2.a, t);
      return `rgba(${r}, ${g}, ${b}, ${a})`;
    }

    // ==================== Crystal Class ====================
    class Crystal {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.vx = (Math.random() - 0.5) * 0.5;
        this.vy = (Math.random() - 0.5) * 0.3;
        this.size = 2 + Math.random() * 4;
        this.maxSize = 5 + Math.random() * 10;
        this.opacity = 0.7 + Math.random() * 0.3;
        this.type = Math.floor(Math.random() * 3);
        this.rotation = Math.random() * Math.PI * 2;
        this.rotationSpeed = (Math.random() - 0.5) * 0.05;
        this.age = 0;
        this.lifespan = 4000 + Math.random() * 3000;
        this.branches = [];
        this.glowSize = this.size * 2;
      }

      update(weather, shakeIntensity) {
        const { bottleX, bottleY, bottleWidth, bottleHeight } = getBottleDimensions();

        this.age += 16;
        this.rotation += this.rotationSpeed;

        if (weather === WEATHER_STATES.STORM) {
          this.size = Math.min(this.size * 1.01, this.maxSize);
          this.glowSize = this.size * 3;
        } else if (weather === WEATHER_STATES.CLOUDY) {
          this.size = Math.max(this.size * 0.995, this.maxSize * 0.6);
          this.glowSize = this.size * 2.5;
        } else {
          this.size = Math.max(this.size * 0.98, 2);
          this.glowSize = this.size * 2;
        }

        if (weather === WEATHER_STATES.STORM) {
          this.vy -= 0.05;
        } else if (weather === WEATHER_STATES.CLOUDY) {
          this.vy -= 0.01;
        } else {
          this.vy += 0.02;
        }

        const convectionForce = Math.sin((this.x - bottleX) / bottleWidth * Math.PI) * 0.01;
        this.vx += convectionForce;
        this.vx *= 0.98;

        this.x += this.vx;
        this.y += this.vy;

        if (shakeIntensity > 0) {
          this.x += (Math.random() - 0.5) * shakeIntensity * 2;
          this.y += (Math.random() - 0.5) * shakeIntensity * 2;
        }

        if (weather === WEATHER_STATES.STORM && Math.random() < 0.01 && this.branches.length < 2) {
          this.branches.push({
            x: this.x,
            y: this.y,
            angle: Math.random() * Math.PI * 2,
            length: 15
          });
        }

        const leftBound = bottleX - bottleWidth / 2 + 5;
        const rightBound = bottleX + bottleWidth / 2 - 5;
        const topBound = bottleY - bottleHeight / 2 + 10;
        const bottomBound = bottleY + bottleHeight / 2 - 10;

        if (this.x < leftBound) {
          this.x = leftBound;
          this.vx *= -0.5;
        }
        if (this.x > rightBound) {
          this.x = rightBound;
          this.vx *= -0.5;
        }
        if (this.y < topBound) {
          this.y = topBound;
          this.vy *= -0.3;
        }
        if (this.y > bottomBound) {
          this.y = bottomBound;
          this.vy *= -0.3;
        }

        return this.age < this.lifespan;
      }

      draw(ctx) {
        ctx.save();
        ctx.globalAlpha = this.opacity * (1 - this.age / this.lifespan);
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotation);

        // Glow effect
        ctx.fillStyle = `rgba(150, 200, 255, ${0.15 * ctx.globalAlpha})`;
        ctx.beginPath();
        ctx.arc(0, 0, this.glowSize, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = `rgba(220, 240, 255, 0.9)`;
        ctx.strokeStyle = `rgba(100, 180, 255, 0.7)`;
        ctx.lineWidth = 0.5;

        switch (this.type) {
          case 0:
            ctx.beginPath();
            ctx.moveTo(0, -this.size);
            ctx.lineTo(0, this.size);
            ctx.stroke();
            break;

          case 1:
            for (let i = 0; i < 6; i++) {
              const angle = (i / 6) * Math.PI * 2;
              const x = Math.cos(angle) * this.size;
              const y = Math.sin(angle) * this.size;
              if (i === 0) ctx.beginPath();
              if (i === 0) ctx.moveTo(x, y);
              else ctx.lineTo(x, y);
            }
            ctx.closePath();
            ctx.stroke();
            break;

          case 2:
            ctx.beginPath();
            ctx.moveTo(0, -this.size);
            ctx.lineTo(0, this.size);
            ctx.stroke();
            for (let i = -2; i <= 2; i++) {
              const y = (i / 2) * this.size;
              const branchLen = (1 - Math.abs(i) / 2.5) * this.size * 0.7;
              ctx.beginPath();
              ctx.moveTo(0, y);
              ctx.lineTo(branchLen, y);
              ctx.lineTo(-branchLen, y);
              ctx.stroke();
            }
            break;
        }

        if (this.branches.length > 0) {
          ctx.strokeStyle = `rgba(100, 180, 255, 0.4)`;
          ctx.lineWidth = 0.3;
          this.branches.forEach(branch => {
            ctx.beginPath();
            ctx.moveTo(0, 0);
            const endX = Math.cos(branch.angle) * branch.length;
            const endY = Math.sin(branch.angle) * branch.length;
            ctx.lineTo(endX, endY);
            ctx.stroke();
          });
        }

        ctx.restore();
      }
    }

    // ==================== Liquid Particle Class ====================
    class LiquidParticle {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.vx = (Math.random() - 0.5) * 0.3;
        this.vy = (Math.random() - 0.5) * 0.1;
        this.size = 1 + Math.random() * 2;
        this.opacity = 0.2 + Math.random() * 0.2;
      }

      update(weather, shakeIntensity) {
        const { bottleX, bottleY, bottleWidth, bottleHeight } = getBottleDimensions();

        const convectionForce = Math.sin((this.x - bottleX) / bottleWidth * Math.PI) * 0.005;
        this.vx += convectionForce;
        this.vy += (weather === WEATHER_STATES.STORM ? -0.01 : -0.002);
        this.vx *= 0.97;

        this.x += this.vx;
        this.y += this.vy;

        if (shakeIntensity > 0) {
          this.x += (Math.random() - 0.5) * shakeIntensity * 1.5;
          this.y += (Math.random() - 0.5) * shakeIntensity * 1.5;
        }

        const leftBound = bottleX - bottleWidth / 2 + 5;
        const rightBound = bottleX + bottleWidth / 2 - 5;
        const topBound = bottleY - bottleHeight / 2 + 10;
        const bottomBound = bottleY + bottleHeight / 2 - 10;

        if (this.x < leftBound) {
          this.x = leftBound;
          this.vx *= -0.5;
        }
        if (this.x > rightBound) {
          this.x = rightBound;
          this.vx *= -0.5;
        }
        if (this.y < topBound) {
          this.y = topBound;
          this.vy *= -0.3;
        }
        if (this.y > bottomBound) {
          this.y = bottomBound;
          this.vy *= -0.3;
        }
      }

      draw(ctx, liquidColor) {
        ctx.fillStyle = liquidColor;
        ctx.globalAlpha = this.opacity;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1.0;
      }
    }

    // ==================== Dust Mote Class (background) ====================
    class DustMote {
      constructor() {
        const { bottleX, bottleY, bottleWidth, bottleHeight } = getBottleDimensions();
        const angle = Math.random() * Math.PI * 2;
        const radius = Math.random() * 200 + 150;
        this.x = bottleX + Math.cos(angle) * radius;
        this.y = bottleY + Math.sin(angle) * radius;
        this.vx = (Math.random() - 0.5) * 0.1;
        this.vy = (Math.random() - 0.5) * 0.1;
        this.size = Math.random() * 1.5 + 0.5;
        this.opacity = Math.random() * 0.3 + 0.05;
        this.phase = Math.random() * Math.PI * 2;
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.phase += 0.01;
        this.opacity = Math.abs(Math.sin(this.phase)) * 0.3 + 0.05;
      }

      draw(ctx) {
        ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // ==================== Drawing Functions ====================
    function drawBackground(weather) {
      const info = WEATHER_INFO[weather];
      const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
      gradient.addColorStop(0, info.bgGradient[0]);
      gradient.addColorStop(1, info.bgGradient[1]);
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      const vignetteGradient = ctx.createRadialGradient(
        canvas.width / 2,
        canvas.height / 2,
        canvas.height * 0.3,
        canvas.width / 2,
        canvas.height / 2,
        canvas.height * 1.2
      );
      vignetteGradient.addColorStop(0, 'rgba(0, 0, 0, 0)');
      vignetteGradient.addColorStop(1, 'rgba(0, 0, 0, 0.3)');
      ctx.fillStyle = vignetteGradient;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    function drawBottle() {
      const { bottleX, bottleY, bottleWidth, bottleHeight } = getBottleDimensions();
      ctx.save();

      // Wooden base
      const baseY = bottleY + bottleHeight / 2 + 20;
      const baseWidth = bottleWidth * 2.5;
      const baseGradient = ctx.createLinearGradient(bottleX - baseWidth / 2, baseY, bottleX + baseWidth / 2, baseY);
      baseGradient.addColorStop(0, 'rgba(139, 90, 43, 0.8)');
      baseGradient.addColorStop(0.5, 'rgba(160, 110, 65, 0.9)');
      baseGradient.addColorStop(1, 'rgba(139, 90, 43, 0.8)');
      ctx.fillStyle = baseGradient;
      ctx.fillRect(bottleX - baseWidth / 2, baseY, baseWidth, 15);
      ctx.strokeStyle = 'rgba(0, 0, 0, 0.3)';
      ctx.lineWidth = 1;
      ctx.strokeRect(bottleX - baseWidth / 2, baseY, baseWidth, 15);

      // Main glass bottle
      const glassGradient = ctx.createLinearGradient(
        bottleX - bottleWidth / 2 - 5,
        bottleY - bottleHeight / 2,
        bottleX + bottleWidth / 2 + 5,
        bottleY + bottleHeight / 2
      );
      glassGradient.addColorStop(0, 'rgba(240, 248, 255, 0.2)');
      glassGradient.addColorStop(0.5, 'rgba(220, 240, 255, 0.35)');
      glassGradient.addColorStop(1, 'rgba(200, 230, 255, 0.2)');

      ctx.fillStyle = glassGradient;
      ctx.beginPath();

      const topY = bottleY - bottleHeight / 2;
      const bottomY = bottleY + bottleHeight / 2;
      const midY = bottleY;

      // Neck (narrow at top)
      ctx.moveTo(bottleX - bottleWidth * 0.2, topY);
      ctx.lineTo(bottleX + bottleWidth * 0.2, topY);

      // Upper shoulder
      ctx.bezierCurveTo(
        bottleX + bottleWidth * 0.35,
        topY + bottleHeight * 0.1,
        bottleX + bottleWidth * 0.45,
        topY + bottleHeight * 0.2,
        bottleX + bottleWidth / 2,
        midY - bottleHeight * 0.1
      );

      // Lower body
      ctx.bezierCurveTo(
        bottleX + bottleWidth / 2,
        midY + bottleHeight * 0.15,
        bottleX + bottleWidth * 0.4,
        bottomY - bottleHeight * 0.05,
        bottleX + bottleWidth * 0.25,
        bottomY
      );

      // Bottom
      ctx.bezierCurveTo(
        bottleX,
        bottomY + bottleHeight * 0.03,
        bottleX,
        bottomY + bottleHeight * 0.03,
        bottleX - bottleWidth * 0.25,
        bottomY
      );

      // Right side
      ctx.bezierCurveTo(
        bottleX - bottleWidth * 0.4,
        bottomY - bottleHeight * 0.05,
        bottleX - bottleWidth / 2,
        midY + bottleHeight * 0.15,
        bottleX - bottleWidth / 2,
        midY - bottleHeight * 0.1
      );

      ctx.bezierCurveTo(
        bottleX - bottleWidth * 0.45,
        topY + bottleHeight * 0.2,
        bottleX - bottleWidth * 0.35,
        topY + bottleHeight * 0.1,
        bottleX - bottleWidth * 0.2,
        topY
      );

      ctx.closePath();
      ctx.fill();

      // Glass outline
      ctx.strokeStyle = 'rgba(150, 200, 255, 0.6)';
      ctx.lineWidth = 2;
      ctx.stroke();

      // Primary highlight (left side)
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(bottleX - bottleWidth / 2 + 3, bottleY - bottleHeight / 2 + 25);
      ctx.bezierCurveTo(
        bottleX - bottleWidth / 2 + 6,
        bottleY - bottleHeight / 4,
        bottleX - bottleWidth / 2 + 4,
        bottleY + bottleHeight / 8,
        bottleX - bottleWidth * 0.15,
        bottleY + bottleHeight / 3
      );
      ctx.stroke();

      // Secondary highlight
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.25)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(bottleX + bottleWidth / 2 - 5, bottleY - bottleHeight / 2 + 40);
      ctx.bezierCurveTo(
        bottleX + bottleWidth / 2 - 8,
        bottleY,
        bottleX + bottleWidth / 2 - 6,
        bottleY + bottleHeight / 6,
        bottleX + bottleWidth * 0.2,
        bottleY + bottleHeight / 2 - 30
      );
      ctx.stroke();

      // Stopper/Cork
      ctx.fillStyle = 'rgba(200, 150, 100, 0.8)';
      const stopperWidth = bottleWidth * 0.3;
      const stopperHeight = bottleHeight * 0.08;
      ctx.fillRect(bottleX - stopperWidth / 2, topY - stopperHeight, stopperWidth, stopperHeight);
      ctx.strokeStyle = 'rgba(0, 0, 0, 0.3)';
      ctx.lineWidth = 1;
      ctx.strokeRect(bottleX - stopperWidth / 2, topY - stopperHeight, stopperWidth, stopperHeight);

      ctx.restore();
    }

    function drawLiquidSurface(weather) {
      const { bottleX, bottleY, bottleWidth, bottleHeight } = getBottleDimensions();
      const info = WEATHER_INFO[weather];

      ctx.save();
      ctx.strokeStyle = interpolateColor('rgba(150, 180, 220, 0.4)', 'rgba(80, 140, 200, 0.6)', {
        clear: 0.2,
        cloudy: 0.5,
        storm: 1
      }[weather]);
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.ellipse(bottleX, bottleY - bottleHeight * 0.15, bottleWidth * 0.4, bottleHeight * 0.03, 0, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }

    function drawWeatherLabel(transitionProgress) {
      const { bottleX, bottleY, bottleHeight } = getBottleDimensions();
      const info = WEATHER_INFO[gameState.weatherState];
      const prevWeatherState = Object.values(WEATHER_STATES)[(Object.values(WEATHER_STATES).indexOf(gameState.weatherState) - 1 + 3) % 3];
      const prevInfo = WEATHER_INFO[prevWeatherState];

      ctx.save();
      ctx.globalAlpha = 1;

      ctx.fillStyle = 'rgba(255, 255, 255, 0.85)';
      ctx.font = `bold ${Math.round(28 * (canvas.height / 800))}px -apple-system, BlinkMacSystemFont, 'Microsoft YaHei', sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';

      const labelY = bottleY + bottleHeight / 2 + 60;

      let displayLabel = info.label;
      let displayEmoji = info.emoji;
      if (transitionProgress < 1 && transitionProgress > 0) {
        ctx.globalAlpha = 1 - transitionProgress;
        ctx.fillText(`${prevInfo.emoji} ${prevInfo.label}`, bottleX, labelY);
        ctx.globalAlpha = transitionProgress;
      }

      ctx.fillText(`${displayEmoji} ${displayLabel}`, bottleX, labelY);

      ctx.font = `${Math.round(16 * (canvas.height / 800))}px -apple-system, BlinkMacSystemFont, 'Microsoft YaHei', sans-serif`;
      ctx.globalAlpha = 0.6;
      ctx.fillText(`${info.temp}°C`, bottleX, labelY + 40);

      ctx.restore();
    }

    function drawScreenFlash(intensity) {
      if (intensity > 0) {
        ctx.save();
        ctx.globalAlpha = intensity * 0.15;
        ctx.fillStyle = 'rgba(255, 255, 255, 1)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.restore();
      }
    }

    // ==================== State Management ====================
    let gameState = {
      weatherState: WEATHER_STATES.CLEAR,
      weatherTimer: 0,
      weatherDuration: 8000 + Math.random() * 2000,
      weatherTransitionProgress: 0,
      crystals: [],
      liquidParticles: [],
      dustMotes: [],
      isShaking: false,
      shakeTimer: 0,
      shakeIntensity: 0,
      screenFlashIntensity: 0,
      time: 0
    };

    function initDustMotes() {
      gameState.dustMotes = [];
      for (let i = 0; i < 15; i++) {
        gameState.dustMotes.push(new DustMote());
      }
    }

    function updateWeather(dt) {
      gameState.weatherTimer += dt;

      if (gameState.weatherTimer >= gameState.weatherDuration) {
        const states = Object.values(WEATHER_STATES);
        const currentIndex = states.indexOf(gameState.weatherState);
        const nextIndex = (currentIndex + 1) % states.length;
        gameState.weatherState = states[nextIndex];
        gameState.weatherTimer = 0;
        gameState.weatherDuration = 8000 + Math.random() * 2000;
        gameState.weatherTransitionProgress = 0;
        spawnCrystals(15);
      } else if (gameState.weatherTimer < 500) {
        gameState.weatherTransitionProgress = gameState.weatherTimer / 500;
      } else {
        gameState.weatherTransitionProgress = 0;
      }
    }

    function spawnCrystals(count) {
      const { bottleX, bottleY, bottleWidth, bottleHeight } = getBottleDimensions();
      for (let i = 0; i < count; i++) {
        const x = bottleX + (Math.random() - 0.5) * bottleWidth * 0.8;
        const y = bottleY + (Math.random() - 0.5) * bottleHeight * 0.8;
        gameState.crystals.push(new Crystal(x, y));
      }
    }

    function spawnLiquidParticles(count) {
      const { bottleX, bottleY, bottleWidth, bottleHeight } = getBottleDimensions();
      for (let i = 0; i < count; i++) {
        const x = bottleX + (Math.random() - 0.5) * bottleWidth * 0.7;
        const y = bottleY + (Math.random() - 0.5) * bottleHeight * 0.7;
        gameState.liquidParticles.push(new LiquidParticle(x, y));
      }
    }

    function onCanvasTap(e) {
      const rect = canvas.getBoundingClientRect();
      const x = (e.clientX || e.touches?.[0].clientX) - rect.left;
      const y = (e.clientY || e.touches?.[0].clientY) - rect.top;

      const { bottleX, bottleY, bottleWidth } = getBottleDimensions();
      const dist = Math.hypot(x - bottleX, y - bottleY);
      if (dist < bottleWidth * 1.5) {
        gameState.isShaking = true;
        gameState.shakeTimer = 0;
        gameState.shakeIntensity = 1;
        gameState.screenFlashIntensity = 0.8;
        spawnCrystals(20);
        spawnLiquidParticles(15);
      }
    }

    // ==================== Animation Loop ====================
    let lastTime = Date.now();

    function animate() {
      const currentTime = Date.now();
      const dt = Math.min(currentTime - lastTime, 50);
      lastTime = currentTime;
      gameState.time += dt;

      updateWeather(dt);

      if (gameState.isShaking) {
        gameState.shakeTimer += dt;
        gameState.shakeIntensity = Math.max(0, 1 - gameState.shakeTimer / 400);
        gameState.screenFlashIntensity = Math.max(0, 0.8 - gameState.shakeTimer / 200);
        if (gameState.shakeIntensity <= 0) {
          gameState.isShaking = false;
        }
      }

      if (gameState.crystals.length < 60) {
        spawnCrystals(2);
      }

      if (gameState.liquidParticles.length < 100) {
        spawnLiquidParticles(3);
      }

      gameState.dustMotes.forEach(m => m.update());
      gameState.crystals = gameState.crystals.filter(c => c.update(gameState.weatherState, gameState.shakeIntensity));
      gameState.liquidParticles.forEach(p => p.update(gameState.weatherState, gameState.shakeIntensity));

      const { bottleX, bottleY } = getBottleDimensions();
      const shake = gameState.shakeIntensity * 8;
      const shakeX = (Math.random() - 0.5) * shake;
      const shakeY = (Math.random() - 0.5) * shake;

      ctx.save();
      ctx.translate(shakeX, shakeY);

      drawBackground(gameState.weatherState);

      gameState.dustMotes.forEach(m => m.draw(ctx));

      drawBottle();

      const info = WEATHER_INFO[gameState.weatherState];
      gameState.liquidParticles.forEach(p => p.draw(ctx, info.liquidColor));

      drawLiquidSurface(gameState.weatherState);

      gameState.crystals.forEach(c => c.draw(ctx));

      ctx.restore();

      drawWeatherLabel(gameState.weatherTransitionProgress);
      drawScreenFlash(gameState.screenFlashIntensity);

      requestAnimationFrame(animate);
    }

    // ==================== Event Listeners ====================
    canvas.addEventListener('click', onCanvasTap);
    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      onCanvasTap(e.touches[0]);
    });

    // ==================== Initialization ====================
    initDustMotes();
    spawnCrystals(40);
    spawnLiquidParticles(70);

    animate();
  </script>
</body>
</html>
