<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="color-scheme" content="dark">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@100;300;400;500;700&display=swap');

  *{margin:0;padding:0;box-sizing:border-box}
  body{
    width:390px;height:844px;overflow:hidden;
    font-family:'Noto Sans SC',system-ui,sans-serif;
    background:#08070f;
    position:relative;
  }

  /* === DUSK GRADIENT — screen splits warm→cool === */
  .dusk-top{
    position:absolute;top:0;left:0;right:0;height:50%;
    background:linear-gradient(180deg,#0c0b18 0%,#1a1432 40%,#2d1f4e 100%);
  }
  .dusk-bottom{
    position:absolute;bottom:0;left:0;right:0;height:55%;
    background:linear-gradient(180deg,#2d1f4e 0%,#4a2040 30%,#8b3a3a 60%,#c4593a 85%,#e87d4a 100%);
    opacity:0.5;
    animation:dusk-glow 6s ease-in-out infinite alternate;
  }
  @keyframes dusk-glow{
    0%{opacity:0.45}100%{opacity:0.6}
  }

  /* === ANIMATED CITY SILHOUETTE === */
  .city{
    position:absolute;bottom:42%;left:0;right:0;height:100px;
    opacity:0;
    animation:city-rise 2s ease-out 0.8s forwards;
  }
  @keyframes city-rise{
    from{opacity:0;transform:translateY(20px)}
    to{opacity:1;transform:translateY(0)}
  }

  /* === WINDOW LIGHTS that flicker === */
  @keyframes window-flicker{
    0%,100%{opacity:0.8}
    30%{opacity:0.3}
    60%{opacity:0.9}
    85%{opacity:0.5}
  }
  @keyframes window-slow{
    0%,100%{opacity:0.4}
    50%{opacity:0.9}
  }

  /* === MOVING CLOUDS === */
  .cloud{
    position:absolute;
    border-radius:50%;
    background:rgba(60,40,80,0.3);
    filter:blur(40px);
    animation:cloud-drift linear infinite;
  }
  @keyframes cloud-drift{
    from{transform:translateX(-100px)}
    to{transform:translateX(500px)}
  }

  /* === HORIZON GLOW === */
  .horizon-glow{
    position:absolute;
    bottom:40%;left:50%;
    transform:translateX(-50%);
    width:120%;height:80px;
    background:radial-gradient(ellipse,rgba(230,120,60,0.25),transparent 70%);
    filter:blur(30px);
  }

  .grain{
    position:absolute;inset:0;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events:none;opacity:0.4;
  }

  .content{
    position:absolute;inset:0;
    display:flex;flex-direction:column;
    padding:48px 28px 40px;
    z-index:10;
  }

  @keyframes fade-up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  @keyframes question-pulse{
    0%,100%{opacity:0.88}
    50%{opacity:0.65}
  }
  @keyframes cursor-blink{
    0%,50%{opacity:1}51%,100%{opacity:0}
  }
  @keyframes suggestion-slide{
    from{opacity:0;transform:translateX(-16px)}
    to{opacity:1;transform:translateX(0)}
  }
</style>
</head>
<body>
  <div class="dusk-top"></div>
  <div class="dusk-bottom"></div>
  <div class="horizon-glow"></div>

  <!-- Clouds -->
  <div class="cloud" style="top:15%;width:180px;height:60px;animation-duration:45s"></div>
  <div class="cloud" style="top:25%;width:120px;height:40px;animation-duration:60s;animation-delay:10s"></div>

  <!-- City silhouette SVG -->
  <div class="city">
    <svg viewBox="0 0 390 100" style="width:100%;height:100%" preserveAspectRatio="xMidYMax meet">
      <!-- Buildings -->
      <rect x="20" y="30" width="28" height="70" fill="rgba(10,8,20,0.9)" rx="1"/>
      <rect x="55" y="15" width="22" height="85" fill="rgba(10,8,20,0.85)" rx="1"/>
      <rect x="82" y="40" width="35" height="60" fill="rgba(10,8,20,0.9)" rx="1"/>
      <rect x="125" y="8" width="18" height="92" fill="rgba(10,8,20,0.85)" rx="1"/>
      <rect x="148" y="25" width="40" height="75" fill="rgba(10,8,20,0.9)" rx="1"/>
      <rect x="195" y="35" width="25" height="65" fill="rgba(10,8,20,0.85)" rx="1"/>
      <rect x="225" y="12" width="20" height="88" fill="rgba(10,8,20,0.9)" rx="1"/>
      <rect x="250" y="20" width="45" height="80" fill="rgba(10,8,20,0.85)" rx="1"/>
      <rect x="300" y="38" width="30" height="62" fill="rgba(10,8,20,0.9)" rx="1"/>
      <rect x="338" y="22" width="24" height="78" fill="rgba(10,8,20,0.85)" rx="1"/>
      <rect x="368" y="45" width="22" height="55" fill="rgba(10,8,20,0.9)" rx="1"/>
      <!-- Window lights -->
      <rect x="60" y="28" width="3" height="3" fill="rgba(255,200,100,0.8)" style="animation:window-flicker 4s ease infinite"/>
      <rect x="60" y="40" width="3" height="3" fill="rgba(255,200,100,0.6)" style="animation:window-slow 6s ease infinite 1s"/>
      <rect x="66" y="50" width="3" height="3" fill="rgba(255,200,100,0.7)" style="animation:window-flicker 5s ease infinite 2s"/>
      <rect x="130" y="25" width="3" height="3" fill="rgba(255,180,80,0.9)" style="animation:window-slow 4s ease infinite 0.5s"/>
      <rect x="130" y="45" width="3" height="3" fill="rgba(255,200,100,0.5)" style="animation:window-flicker 7s ease infinite 3s"/>
      <rect x="155" y="38" width="4" height="3" fill="rgba(255,200,100,0.8)" style="animation:window-slow 5s ease infinite"/>
      <rect x="170" y="50" width="3" height="3" fill="rgba(255,180,80,0.6)" style="animation:window-flicker 6s ease infinite 1.5s"/>
      <rect x="232" y="30" width="3" height="3" fill="rgba(255,200,100,0.7)" style="animation:window-slow 5s ease infinite 2s"/>
      <rect x="260" y="35" width="4" height="3" fill="rgba(255,200,100,0.8)" style="animation:window-flicker 4s ease infinite 1s"/>
      <rect x="275" y="50" width="3" height="3" fill="rgba(255,180,80,0.5)" style="animation:window-slow 6s ease infinite 3s"/>
      <rect x="345" y="38" width="3" height="3" fill="rgba(255,200,100,0.7)" style="animation:window-flicker 5s ease infinite 0.5s"/>
    </svg>
  </div>

  <div class="grain"></div>

  <div class="content">
    <!-- Time -->
    <div style="animation:fade-up 0.8s ease 0.5s both">
      <div style="font-size:14px;color:rgba(255,200,170,0.5);letter-spacing:6px;font-weight:300">周三 · 四月</div>
    </div>

    <!-- HERO: Giant time as the dominant visual — the "stuck" moment -->
    <div style="margin-top:24px;animation:fade-up 1s ease 1s both">
      <div style="font-size:160px;font-weight:100;color:rgba(255,240,220,0.92);line-height:0.85;letter-spacing:-8px;text-shadow:0 4px 60px rgba(200,80,40,0.15)">
        19:03
      </div>
    </div>

    <!-- The QUESTION — the emotional core -->
    <div style="margin-top:28px;animation:fade-up 1s ease 1.8s both">
      <div style="font-size:36px;font-weight:100;color:rgba(255,220,190,0.88);line-height:1.4;animation:question-pulse 6s ease-in-out infinite;text-shadow:0 2px 16px rgba(0,0,0,0.4)">
        下班了。<br>
        然后呢<span style="display:inline-block;width:3px;height:32px;background:rgba(255,180,100,0.7);margin-left:4px;vertical-align:middle;animation:cursor-blink 1.2s step-end infinite"></span>
      </div>
    </div>

    <!-- Spacer -->
    <div style="flex:1"></div>

    <!-- Suggestions — like the AI is thinking with you -->
    <div style="margin-bottom:20px">
      <div style="font-size:12px;color:rgba(255,200,170,0.4);letter-spacing:3px;margin-bottom:14px;animation:fade-up 0.8s ease 2.5s both">也许今晚可以 ——</div>

      <div style="animation:suggestion-slide 0.8s ease 2.8s both">
        <div style="display:flex;align-items:center;gap:14px;padding:14px 18px;background:rgba(255,255,255,0.06);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:16px;border:1px solid rgba(255,200,150,0.08);margin-bottom:10px">
          <div style="font-size:28px">🍜</div>
          <div>
            <div style="font-size:17px;color:rgba(255,240,220,0.88)">楼下新开的螺蛳粉</div>
            <div style="font-size:13px;color:rgba(255,200,170,0.5);margin-top:2px">步行 6 分钟 · 评分 4.8 · 人还不多</div>
          </div>
        </div>
      </div>

      <div style="animation:suggestion-slide 0.8s ease 3.1s both">
        <div style="display:flex;align-items:center;gap:14px;padding:14px 18px;background:rgba(255,255,255,0.06);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:16px;border:1px solid rgba(255,200,150,0.08);margin-bottom:10px">
          <div style="font-size:28px">🎧</div>
          <div>
            <div style="font-size:17px;color:rgba(255,240,220,0.88)">上次没听完的播客</div>
            <div style="font-size:13px;color:rgba(255,200,170,0.5);margin-top:2px">《随机波动》EP.203 · 还剩 34 分钟</div>
          </div>
        </div>
      </div>

      <div style="animation:suggestion-slide 0.8s ease 3.4s both">
        <div style="display:flex;align-items:center;gap:14px;padding:14px 18px;background:rgba(255,255,255,0.06);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:16px;border:1px solid rgba(255,200,150,0.08)">
          <div style="font-size:28px">🌙</div>
          <div>
            <div style="font-size:17px;color:rgba(255,240,220,0.88)">什么也不做</div>
            <div style="font-size:13px;color:rgba(255,200,170,0.5);margin-top:2px">今天够累了，发呆也是正经事</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div style="text-align:center;animation:fade-up 0.8s ease 3.8s both">
      <div style="font-size:11px;color:rgba(255,180,130,0.18);letter-spacing:8px">GLINT · DUSK</div>
    </div>
  </div>
</body>
</html>
