<!doctype html>
<html>
<head>
<meta name="color-scheme" content="light">
<style>
@keyframes blob1 { 0%,100% { transform: translate(0,0) scale(1); } 33% { transform: translate(30px,-50px) scale(1.1); } 66% { transform: translate(-20px,20px) scale(0.9); } }
@keyframes blob2 { 0%,100% { transform: translate(0,0) scale(1); } 33% { transform: translate(-40px,30px) scale(1.15); } 66% { transform: translate(20px,-40px) scale(0.95); } }
@keyframes blob3 { 0%,100% { transform: translate(0,0) scale(1); } 33% { transform: translate(20px,40px) scale(0.9); } 66% { transform: translate(-30px,-20px) scale(1.1); } }
@keyframes float-up { from { opacity:0; transform:translateY(30px); } to { opacity:1; transform:translateY(0); } }
@keyframes shimmer { 0%,100% { opacity:.7; } 50% { opacity:1; } }
</style>
</head>
<body style="margin:0;overflow:hidden;width:100vw;height:100vh;font-family:var(--font-display);background:#1a0e2e">

<!-- === AURORA MESH GRADIENT === -->
<!-- 3 animated blobs + heavy blur = living aurora -->
<div style="position:absolute;inset:-30%;width:160%;height:160%;filter:blur(80px);opacity:.85">
  <div style="position:absolute;top:10%;left:15%;width:50vmax;height:50vmax;border-radius:50%;background:radial-gradient(circle,#ff9a56,#ff6b8a 50%,transparent 70%);animation:blob1 12s ease-in-out infinite"></div>
  <div style="position:absolute;top:35%;left:45%;width:55vmax;height:55vmax;border-radius:50%;background:radial-gradient(circle,#ffd46b,#ffa040 50%,transparent 70%);animation:blob2 15s ease-in-out infinite"></div>
  <div style="position:absolute;top:55%;left:10%;width:45vmax;height:45vmax;border-radius:50%;background:radial-gradient(circle,#f97794,#c44dff 50%,transparent 70%);animation:blob3 18s ease-in-out infinite"></div>
</div>

<!-- Noise texture overlay for grain -->
<svg style="position:absolute;inset:0;width:100%;height:100%;opacity:.04;pointer-events:none"><filter id="n"><feTurbulence baseFrequency=".65" numOctaves="4" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(#n)"/></svg>

<!-- === CONTENT: temperature IS the visual === -->

<!-- Giant temperature — the number IS the art, occupying the center -->
<div style="position:absolute;top:18%;left:0;right:0;text-align:center;animation:float-up .8s ease both">
  <div style="font-size:clamp(180px,55vw,320px);font-weight:100;color:rgba(255,255,255,0.9);line-height:.8;letter-spacing:-12px;text-shadow:0 4px 60px rgba(255,100,50,0.3)">26°</div>
  <div style="font-size:18px;color:rgba(255,255,255,0.6);letter-spacing:4px;margin-top:12px">多云转晴 · 午后放晴</div>
</div>

<!-- Time — NOT the hero, just context. Tucked upper-left -->
<div style="position:absolute;top:6%;left:6%;animation:float-up .6s ease both">
  <div style="font-size:20px;font-weight:300;color:rgba(255,255,255,0.5)">08:20</div>
  <div style="font-size:14px;color:rgba(255,255,255,0.3)">周六早上</div>
</div>

<!-- Greeting — handwritten feel, overlapping the temperature -->
<div style="position:absolute;top:50%;left:8%;right:8%;animation:float-up .9s ease .2s both">
  <div style="font-size:28px;font-weight:300;color:rgba(255,255,255,0.85);line-height:1.5">今天阳光很好，<br>不着急，慢慢来。</div>
</div>

<!-- Info: glass morphism card, but ONLY ONE, with dense useful content -->
<div style="position:absolute;bottom:16%;left:6%;right:6%;background:rgba(255,255,255,0.1);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-radius:20px;padding:20px;border:1px solid rgba(255,255,255,0.15);animation:float-up 1s ease .4s both">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
    <span style="font-size:15px;color:rgba(255,255,255,0.5)">今日安排</span>
    <span style="font-size:13px;color:rgba(255,200,100,0.6);animation:shimmer 3s ease infinite">✦ AI 已整理</span>
  </div>
  <div style="font-size:18px;color:rgba(255,255,255,0.85);line-height:1.7">
    <div style="display:flex;justify-content:space-between"><span>🍽 老王火锅 · 5人聚餐</span><span style="color:rgba(255,255,255,0.4)">14:00</span></div>
    <div style="display:flex;justify-content:space-between;margin-top:2px"><span>📦 京东快递 丰巢#327</span><span style="color:rgba(255,255,255,0.4)">取件码 528190</span></div>
    <div style="display:flex;justify-content:space-between;margin-top:2px"><span>🏃 建议下午跑步</span><span style="color:rgba(255,255,255,0.4)">空气优</span></div>
  </div>
</div>

<!-- Brand whisper -->
<div style="position:absolute;bottom:6%;left:0;right:0;text-align:center;animation:float-up 1s ease .6s both">
  <div style="font-size:12px;color:rgba(255,255,255,0.15);letter-spacing:6px">GLINT · MORNING</div>
</div>

</body>
</html>
