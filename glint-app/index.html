<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="description" content="Glint — AI 生成式锁屏 Demo" />
    <title>Glint</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/index.css">
    <style>
      body { margin: 0; overflow: hidden; background: #000; }

      /* === MemoryDeck === */
      .memory-deck {
        position: absolute;
        left: 4%;
        top: 18%;
        bottom: 18%;
        width: 28vw;
        max-width: 160px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        justify-content: center;
        pointer-events: none;
        z-index: 20;
      }
      .memory-card {
        background: rgba(255, 255, 255, 0.06);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        padding: 8px 10px 10px;
        opacity: 0.42;
        transform: scale(0.96);
        transition: opacity 400ms ease, transform 400ms ease, box-shadow 400ms ease;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .memory-card-lit {
        opacity: 0.92;
        transform: scale(1);
        box-shadow: 0 4px 24px rgba(255, 220, 150, 0.18);
      }
      .memory-card-icon {
        font-size: 14px;
        line-height: 1;
      }
      .memory-card-label {
        font-size: 10px;
        color: rgba(255, 255, 255, 0.45);
        letter-spacing: 1px;
      }
      .memory-card-phrase {
        font-size: 13px;
        color: rgba(255, 255, 255, 0.85);
        line-height: 1.3;
        font-weight: 300;
      }

      /* === Bottom sheet === */
      .app-sheet {
        position: absolute;
        inset: 0;
        z-index: 50;
        background: rgba(0, 0, 0, 0.45);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        display: flex;
        align-items: flex-end;
        animation: sheet-fade 220ms ease both;
      }
      .app-sheet-panel {
        width: 100%;
        max-height: 80%;
        background: rgba(20, 20, 24, 0.92);
        border-top-left-radius: 24px;
        border-top-right-radius: 24px;
        padding: 24px 20px 32px;
        overflow-y: auto;
        animation: sheet-rise 260ms cubic-bezier(0.22, 0.61, 0.36, 1) both;
      }
      @keyframes sheet-fade {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes sheet-rise {
        from { transform: translateY(60%); }
        to { transform: translateY(0); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
